seed: 80
prefer_gpu: false
results_dir: results
epochs: 3
batch_size: 64
lr: 0.003
n_counterfactuals: 4
tasks: [synthetic, vision, text]
data:
  n_train: 220
  n_test: 120
  train_corr: 0.98
  id_corr: 0.98
  shift_corr: 0.98
  shift_mode: partial_in_support_flip
  partial_flip_fraction: 0.6
  partial_flip_strength: 1.0
  noise: 0.30
  causal_strength: 1.0
  shortcut_strength: 1.3
vision:
  epochs: 2
  lr: 0.002
  data:
    n_train: 140
    n_test: 80
    image_size: 16
    shortcut_type: color
text:
  epochs: 2
  data:
    n_train: 160
    n_test: 80
