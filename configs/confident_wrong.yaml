seed: 7
prefer_gpu: false
results_dir: results
epochs: 8
batch_size: 64
lr: 0.003
n_counterfactuals: 4
min_high_conf_examples: 8
tasks:
  - synthetic
  - vision
  - text
data:
  n_train: 240
  n_test: 120
  train_corr: 0.98
  id_corr: 0.98
  shift_corr: 0.0
  shift_mode: in_support_flip
  noise: 0.30
  causal_strength: 1.0
  shortcut_strength: 1.3
vision:
  epochs: 5
  data:
    n_train: 160
    n_test: 80
    image_size: 16
    shortcut_type: color
text:
  epochs: 5
  data:
    n_train: 200
    n_test: 100
