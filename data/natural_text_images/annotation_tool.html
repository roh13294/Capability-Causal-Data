<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Natural-Text Dataset Annotation Tool</title>
<style>
  :root { --bg:#1e1f24; --panel:#2a2c33; --accent:#4f9dff; --text:#e6e6e6; --muted:#9aa0aa; --ok:#4caf50; --warn:#ff9800; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
  header { padding:8px 14px; background:var(--panel); display:flex; align-items:center; gap:14px; flex-wrap:wrap; border-bottom:1px solid #000; position:sticky; top:0; z-index:10; }
  header h1 { font-size:15px; margin:0; }
  .layout { display:flex; gap:14px; padding:14px; align-items:flex-start; }
  .canvas-wrap { background:var(--panel); padding:10px; border-radius:6px; }
  #stage { position:relative; display:inline-block; line-height:0; cursor:crosshair; }
  #img { display:block; max-width:70vw; max-height:78vh; user-select:none; -webkit-user-drag:none; }
  #overlay { position:absolute; left:0; top:0; }
  .side { width:380px; flex:0 0 380px; display:flex; flex-direction:column; gap:10px; }
  .card { background:var(--panel); border-radius:6px; padding:10px 12px; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 8px; }
  label.field { display:block; font-size:12px; color:var(--muted); margin:6px 0 2px; }
  input[type=text], textarea, select { width:100%; background:#1b1c21; color:var(--text); border:1px solid #3a3d45; border-radius:4px; padding:6px 7px; font-size:13px; font-family:inherit; }
  textarea { resize:vertical; min-height:48px; }
  .row { display:flex; gap:6px; flex-wrap:wrap; }
  button { background:#3a3d45; color:var(--text); border:1px solid #4a4d55; border-radius:4px; padding:6px 10px; font-size:13px; cursor:pointer; }
  button:hover { background:#474a53; }
  button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.danger { background:#5a2a2a; border-color:#7a3a3a; }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .pill { font-size:11px; padding:2px 7px; border-radius:10px; background:#3a3d45; }
  .boxlist { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; }
  .boxrow { display:flex; align-items:center; gap:6px; padding:3px 0; border-bottom:1px solid #353841; }
  .boxrow .coords { flex:1; word-break:break-all; }
  .swatch { width:12px; height:12px; border-radius:2px; flex:0 0 12px; }
  .text-swatch { background:#ff5a5a; }
  .obj-swatch { background:#4f9dff; }
  .seg { display:flex; gap:0; }
  .seg button { border-radius:0; }
  .seg button:first-child { border-radius:4px 0 0 4px; }
  .seg button:last-child { border-radius:0 4px 4px 0; }
  .small { font-size:11px; color:var(--muted); }
  .status-dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:5px; background:#666; }
  .status-dot.done { background:var(--ok); }
  .status-dot.excluded { background:var(--warn); }
  #imgindexlist { max-height:140px; overflow:auto; font-size:12px; }
  #imgindexlist div { padding:2px 4px; cursor:pointer; border-radius:3px; }
  #imgindexlist div:hover { background:#363942; }
  #imgindexlist div.current { background:var(--accent); color:#fff; }
  code { background:#1b1c21; padding:1px 4px; border-radius:3px; }
</style>
</head>
<body>
<header>
  <h1>Natural-Text Annotation Tool</h1>
  <span class="pill" id="progress">0 / 0</span>
  <button id="prevBtn">&larr; Prev</button>
  <button id="nextBtn">Next &rarr;</button>
  <span class="small">Box mode:</span>
  <div class="seg">
    <button id="modeText" class="active">Text/Logo box</button>
    <button id="modeObj">Object box</button>
  </div>
  <button id="undoBtn">Undo last box</button>
  <div style="flex:1"></div>
  <button id="exportBtn" class="primary">Export CSV</button>
  <button id="saveLocalBtn">Save to browser</button>
</header>

<div class="layout">
  <div class="canvas-wrap">
    <div id="stage">
      <img id="img" alt="">
      <canvas id="overlay"></canvas>
    </div>
    <div class="small" id="dims" style="margin-top:6px"></div>
  </div>

  <div class="side">
    <div class="card">
      <h2>Image</h2>
      <div id="imgpath" class="small" style="word-break:break-all"></div>
      <label class="field">Hint (from metadata notes)</label>
      <div id="hint" class="small" style="white-space:pre-wrap"></div>
    </div>

    <div class="card">
      <h2>Boxes <span class="small">(drag on image to draw)</span></h2>
      <label class="field"><span class="swatch text-swatch" style="display:inline-block;vertical-align:middle"></span> text_or_logo_boxes</label>
      <div id="textBoxes" class="boxlist"></div>
      <label class="field"><span class="swatch obj-swatch" style="display:inline-block;vertical-align:middle"></span> object_boxes</label>
      <div id="objBoxes" class="boxlist"></div>
    </div>

    <div class="card">
      <h2>Labels (pre-filled, editable)</h2>
      <label class="field">visual_target_label</label>
      <input type="text" id="visTarget">
      <label class="field">visual_label_aliases (; separated)</label>
      <input type="text" id="visAliases">
      <label class="field">text_distractor_labels (; separated)</label>
      <input type="text" id="textDistract">
    </div>

    <div class="card">
      <h2>Decisions</h2>
      <label class="field">text_driven_candidate</label>
      <div class="seg" id="candSeg">
        <button data-v="yes">yes</button>
        <button data-v="no">no</button>
        <button data-v="maybe">maybe</button>
      </div>
      <label class="field">include_in_verified_failure_eval</label>
      <div class="seg" id="inclSeg">
        <button data-v="yes">yes</button>
        <button data-v="no">no</button>
      </div>
      <label class="field">exclusion_reason</label>
      <input type="text" id="exclReason" placeholder="e.g. REVIEW: graphic-heavy, ambiguous target">
      <label class="field">notes</label>
      <textarea id="notes"></textarea>
    </div>

    <div class="card">
      <h2>All images</h2>
      <div id="imgindexlist"></div>
    </div>
  </div>
</div>

    "visual_label_aliases": "truck;delivery truck;vehicle;van;fedex;logo",
    "text_distractor_labels": "delivery truck;vehicle;van;fedex;logo",
    "notes_hint": "FedEx delivery truck in front of a FedEx Office store; 'FedEx' logo/text could shortcut"
  },
  {
    "image_path": "images/wetfloor.jpg",
    "visual_target_label": "safety cone",
    "visual_label_aliases": "safety cone;caution cone;wet floor sign;mop;warning sign;sign",
    "text_distractor_labels": "caution cone;wet floor sign;mop;warning sign;sign",
    "notes_hint": "yellow 'CAUTION WET FLOOR' cone beside a mop and bucket; warning text could shortcut"
  },
  {
    "image_path": "images/xbox.jpg",
    "visual_target_label": "game controller",
    "visual_label_aliases": "game controller;controller;gamepad;xbox;console;logo",
    "text_distractor_labels": "controller;gamepad;xbox;console;logo",
    "notes_hint": "white Xbox wireless controller; Xbox logo could shortcut"
  }
];
const STORAGE_KEY = 'natural_text_annotations_v1';

// annotation state, one entry per image, keyed by image_path
const state = {};
META.forEach(m => {
  state[m.image_path] = {
    image_path: m.image_path,
    visual_target_label: m.visual_target_label,
    visual_label_aliases: m.visual_label_aliases,
    text_distractor_labels: m.text_distractor_labels,
    text_or_logo_boxes: [],   // each: {x1,y1,x2,y2}
    object_boxes: [],
    text_driven_candidate: '',
    include_in_verified_failure_eval: '',
    exclusion_reason: '',
    notes: ''
  };
});

// restore from localStorage if present
try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if (saved) Object.keys(saved).forEach(k => { if (state[k]) Object.assign(state[k], saved[k]); });
} catch(e) {}

let idx = 0;
let boxMode = 'text'; // 'text' | 'obj'

const img = document.getElementById('img');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const stage = document.getElementById('stage');

// natural<->display scale (we store coords in NATURAL pixel units)
function scale() {
  return img.naturalWidth ? (img.clientWidth / img.naturalWidth) : 1;
}

function cur() { return state[META[idx].image_path]; }

function loadImage() {
  const m = META[idx];
  document.getElementById('imgpath').textContent = m.image_path;
  document.getElementById('hint').textContent = m.notes_hint || '';
  const c = cur();
  document.getElementById('visTarget').value = c.visual_target_label;
  document.getElementById('visAliases').value = c.visual_label_aliases;
  document.getElementById('textDistract').value = c.text_distractor_labels;
  document.getElementById('exclReason').value = c.exclusion_reason;
  document.getElementById('notes').value = c.notes;
  setSeg('candSeg', c.text_driven_candidate);
  setSeg('inclSeg', c.include_in_verified_failure_eval);
  img.onload = () => { sizeOverlay(); redraw(); updateDims(); };
  img.src = m.image_path;
  document.getElementById('progress').textContent = (idx+1) + ' / ' + META.length;
  renderBoxLists();
  renderIndex();
}

function updateDims(){
  document.getElementById('dims').textContent =
    'Natural size: ' + img.naturalWidth + ' x ' + img.naturalHeight + ' px  |  shown at ' + Math.round(scale()*100) + '%';
}

function sizeOverlay() {
  overlay.width = img.clientWidth;
  overlay.height = img.clientHeight;
  overlay.style.width = img.clientWidth + 'px';
  overlay.style.height = img.clientHeight + 'px';
}

window.addEventListener('resize', () => { sizeOverlay(); redraw(); updateDims(); });

// ---- drawing boxes ----
let drag = null;
stage.addEventListener('mousedown', e => {
  if (e.target !== overlay && e.target !== img) return;
  const r = overlay.getBoundingClientRect();
  drag = { x0: e.clientX - r.left, y0: e.clientY - r.top, x1: e.clientX - r.left, y1: e.clientY - r.top };
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const r = overlay.getBoundingClientRect();
  drag.x1 = Math.max(0, Math.min(overlay.width,  e.clientX - r.left));
  drag.y1 = Math.max(0, Math.min(overlay.height, e.clientY - r.top));
  redraw();
});
window.addEventListener('mouseup', e => {
  if (!drag) return;
  const s = scale();
  let x1 = drag.x0/s, y1 = drag.y0/s, x2 = drag.x1/s, y2 = drag.y1/s;
  const bx = { x1: Math.round(Math.min(x1,x2)), y1: Math.round(Math.min(y1,y2)),
               x2: Math.round(Math.max(x1,x2)), y2: Math.round(Math.max(y1,y2)) };
  if ((bx.x2-bx.x1) > 3 && (bx.y2-bx.y1) > 3) {
    (boxMode==='text' ? cur().text_or_logo_boxes : cur().object_boxes).push(bx);
    renderBoxLists(); persist();
  }
  drag = null; redraw();
});

function redraw() {
  ctx.clearRect(0,0,overlay.width,overlay.height);
  const s = scale();
  const draw = (boxes, color) => {
    ctx.lineWidth = 2; ctx.strokeStyle = color; ctx.font = '12px monospace'; ctx.fillStyle = color;
    boxes.forEach((b,i) => {
      const x=b.x1*s, y=b.y1*s, w=(b.x2-b.x1)*s, h=(b.y2-b.y1)*s;
      ctx.strokeRect(x,y,w,h);
      ctx.fillText((color==='#ff5a5a'?'T':'O')+(i+1), x+2, y+12);
    });
  };
  draw(cur().text_or_logo_boxes, '#ff5a5a');
  draw(cur().object_boxes, '#4f9dff');
  if (drag) {
    ctx.lineWidth = 1.5; ctx.setLineDash([5,4]);
    ctx.strokeStyle = boxMode==='text' ? '#ff5a5a' : '#4f9dff';
    ctx.strokeRect(Math.min(drag.x0,drag.x1), Math.min(drag.y0,drag.y1),
                   Math.abs(drag.x1-drag.x0), Math.abs(drag.y1-drag.y0));
    ctx.setLineDash([]);
    // live coords
    const s2 = scale();
    const lx1=Math.round(Math.min(drag.x0,drag.x1)/s2), ly1=Math.round(Math.min(drag.y0,drag.y1)/s2);
    const lx2=Math.round(Math.max(drag.x0,drag.x1)/s2), ly2=Math.round(Math.max(drag.y0,drag.y1)/s2);
    document.getElementById('dims').textContent = 'Drawing: ' + lx1+','+ly1+','+lx2+','+ly2;
  }
}

function fmt(b){ return b.x1+','+b.y1+','+b.x2+','+b.y2; }

function renderBoxLists() {
  const mk = (boxes, swatch, key) => boxes.map((b,i) =>
    '<div class="boxrow"><span class="swatch '+swatch+'"></span>'+
    '<span class="coords">'+fmt(b)+'</span>'+
    '<button data-key="'+key+'" data-i="'+i+'" class="delbox">x</button></div>'
  ).join('') || '<div class="small">none</div>';
  document.getElementById('textBoxes').innerHTML = mk(cur().text_or_logo_boxes,'text-swatch','text_or_logo_boxes');
  document.getElementById('objBoxes').innerHTML  = mk(cur().object_boxes,'obj-swatch','object_boxes');
  document.querySelectorAll('.delbox').forEach(btn => btn.onclick = () => {
    cur()[btn.dataset.key].splice(+btn.dataset.i,1); renderBoxLists(); redraw(); persist();
  });
}

// ---- segmented controls ----
function setSeg(id, val){
  document.querySelectorAll('#'+id+' button').forEach(b =>
    b.classList.toggle('active', b.dataset.v === val));
}
document.getElementById('candSeg').addEventListener('click', e => {
  if(e.target.dataset.v){ cur().text_driven_candidate = e.target.dataset.v; setSeg('candSeg', e.target.dataset.v); persist(); }
});
document.getElementById('inclSeg').addEventListener('click', e => {
  if(e.target.dataset.v){ cur().include_in_verified_failure_eval = e.target.dataset.v; setSeg('inclSeg', e.target.dataset.v); renderIndex(); persist(); }
});

// ---- text inputs ----
const bind = (id, key, reindex) => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => { cur()[key] = el.value; persist(); if(reindex) renderIndex(); });
};
bind('visTarget','visual_target_label');
bind('visAliases','visual_label_aliases');
bind('textDistract','text_distractor_labels');
bind('exclReason','exclusion_reason', true);
bind('notes','notes');

// ---- box mode ----
document.getElementById('modeText').onclick = () => { boxMode='text';
  document.getElementById('modeText').classList.add('active'); document.getElementById('modeObj').classList.remove('active'); };
document.getElementById('modeObj').onclick = () => { boxMode='obj';
  document.getElementById('modeObj').classList.add('active'); document.getElementById('modeText').classList.remove('active'); };
document.getElementById('undoBtn').onclick = () => {
  const arr = boxMode==='text' ? cur().text_or_logo_boxes : cur().object_boxes;
  arr.pop(); renderBoxLists(); redraw(); persist();
};

// ---- navigation ----
document.getElementById('prevBtn').onclick = () => { if(idx>0){ idx--; loadImage(); } };
document.getElementById('nextBtn').onclick = () => { if(idx<META.length-1){ idx++; loadImage(); } };
window.addEventListener('keydown', e => {
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  if(e.key==='ArrowRight'){ document.getElementById('nextBtn').click(); }
  if(e.key==='ArrowLeft'){ document.getElementById('prevBtn').click(); }
  if(e.key==='t'||e.key==='T'){ document.getElementById('modeText').click(); }
  if(e.key==='o'||e.key==='O'){ document.getElementById('modeObj').click(); }
  if(e.key==='u'||e.key==='U'){ document.getElementById('undoBtn').click(); }
});

function renderIndex(){
  const list = document.getElementById('imgindexlist');
  list.innerHTML = META.map((m,i) => {
    const c = state[m.image_path];
    let cls='status-dot';
    if(c.include_in_verified_failure_eval==='yes') cls+=' done';
    else if(c.include_in_verified_failure_eval==='no') cls+=' excluded';
    return '<div data-i="'+i+'" class="'+(i===idx?'current':'')+'"><span class="'+cls+'"></span>'+
           (i+1)+'. '+m.image_path.replace('images/','')+'</div>';
  }).join('');
  list.querySelectorAll('div[data-i]').forEach(d => d.onclick = () => { idx=+d.dataset.i; loadImage(); });
}

// ---- persistence ----
function persist(){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){} }
document.getElementById('saveLocalBtn').onclick = () => { persist(); alert('Saved to this browser (localStorage). Use Export CSV to write the file.'); };

// ---- CSV export ----
function csvEscape(v){ v = (v==null?'':String(v)); return '"' + v.replace(/"/g,'""') + '"'; }
function boxesToStr(boxes){ return boxes.map(fmt).join('|'); }

function buildCSV(){
  const cols = ['image_path','visual_target_label','visual_label_aliases','text_distractor_labels',
    'text_or_logo_boxes','object_boxes','text_driven_candidate','include_in_verified_failure_eval',
    'exclusion_reason','notes'];
  const lines = [cols.join(',')];
  META.forEach(m => {
    const c = state[m.image_path];
    const rec = {
      image_path: c.image_path,
      visual_target_label: c.visual_target_label,
      visual_label_aliases: c.visual_label_aliases,
      text_distractor_labels: c.text_distractor_labels,
      text_or_logo_boxes: boxesToStr(c.text_or_logo_boxes),
      object_boxes: boxesToStr(c.object_boxes),
      text_driven_candidate: c.text_driven_candidate,
      include_in_verified_failure_eval: c.include_in_verified_failure_eval,
      exclusion_reason: c.exclusion_reason,
      notes: c.notes
    };
    lines.push(cols.map(k => csvEscape(rec[k])).join(','));
  });
  return lines.join('\n') + '\n';
}

document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([buildCSV()], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'verified_annotations.csv';
  document.body.appendChild(a); a.click(); a.remove();
};

loadImage();
</script>
</body>
</html>
